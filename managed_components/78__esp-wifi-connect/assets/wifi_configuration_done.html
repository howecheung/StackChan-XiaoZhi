<!DOCTYPE html>
<html>
<head>
    <title>StackChan 配网</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Segoe UI", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-area {
            padding: 20px 16px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        /* Brand */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .brand-header .logo {
            width: 36px; height: 36px;
            min-width: 36px;
            background: linear-gradient(135deg, #0071e3, #40a9ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1;
            box-shadow: 0 3px 8px rgba(0,113,227,0.2);
        }
        .brand-header .brand-text {
            text-align: left;
        }
        .brand-header .brand-text h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        /* Checkmark */
        .checkmark-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e8f5e9;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkmark-icon svg {
            width: 36px;
            height: 36px;
        }
        .checkmark-circle {
            fill: none;
            stroke: #34c759;
            stroke-width: 2.5;
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            animation: draw-circle 0.6s ease-out forwards;
        }
        .checkmark-check {
            fill: none;
            stroke: #34c759;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: draw-check 0.4s 0.4s ease-out forwards;
        }
        @keyframes draw-circle {
            to { stroke-dashoffset: 0; }
        }
        @keyframes draw-check {
            to { stroke-dashoffset: 0; }
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.3px;
        }
        .card .msg {
            font-size: 14px;
            color: #86868b;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="content-area">
        <div class="brand-header">
            <div class="logo">🤖</div>
            <div class="brand-text">
                <h1>StackChan 配网</h1>
            </div>
        </div>

        <div class="card">
            <div class="checkmark-icon">
                <svg viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
                    <path class="checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h2>配置成功!</h2>
            <p class="msg">Configuration successful!</p>
            <p class="msg">设备已连接到网络</p>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                fetch('/exit', {
                    method: 'POST'
                })
                .then(response => {
                    if (response.ok) {
                        console.log('Exit config mode request sent');
                    } else {
                        console.error('Failed to send exit request');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            }, 1000);
        });
    </script>
</body>
</html>
